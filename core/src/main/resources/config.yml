# ╔══════════════════════════════════════════════╗
# ║           Atom Guard Configuration           ║
# ║   Server Security Plugin — Paper 1.21.4      ║
# ║   v2.0.2 — Full English Translation          ║
# ╚══════════════════════════════════════════════╝

# Config Version (Do not change)
config-version: "2.0.2"

# General Settings
general:
  # Plugin language (tr, en)
  language: "en"
  # Plugin prefix (used in messages)
  prefix: "<gradient:#00d4ff:#00ff88>AtomGuard</gradient> <dark_gray>»</dark_gray>"
  # Debug mode (prints developer info to console)
  debug: false
  # Log system
  log:
    enabled: true
    # Log files folder
    folder: "logs/atomguard"
    # Create daily log file
    daily-file: true
    # How long to keep old logs (days, 0 = never delete)
    retention-days: 7

# Database Settings
database:
  # Storage type: MYSQL, SQLITE, FLATFILE (currently only MySQL is active)
  type: "FLATFILE"
  # MySQL Settings
  mysql:
    host: "localhost"
    port: 3306
    database: "atomguard"
    username: "root"
    password: ""
    use-ssl: false

# Redis Settings (Cross-Server Synchronization)
redis:
  # Enable Redis (recommended if you have multiple servers)
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  # Connection timeout (ms)
  timeout: 2000

# Web Panel Settings
web-panel:
  # Enable web panel
  enabled: true
  # Web panel port
  port: 8081
  # Authentication (HTTP Basic Auth)
  auth:
    enabled: true
    username: "admin"
    password: "atomguard2024"
  # Maximum number of events displayed in web panel
  max-events: 100
  # CORS origin (empty = loopback only, "*" = all origins)
  cors-origin: ""
  # REST API settings
  api:
    enabled: true
    rate-limit: 60
  # Server-Sent Events (real-time notifications)
  sse:
    enabled: true
    heartbeat-seconds: 30
  # JWT Authentication
  jwt:
    # JWT signing key (auto-generated if empty)
    secret: ""
    # Token validity duration (minutes)
    token-expiry-minutes: 120
  # Attack map
  geo-map:
    enabled: true
    max-events: 500
    update-seconds: 60

# Discord Webhook Notifications
discord-webhook:
  # Enable webhook system
  enabled: false
  # Discord webhook URL
  webhook-url: ""
  # Notification types (each can be toggled individually)
  notifications:
    attack-mode: true
    exploit-block: true
    bot-kick: true
    panic-command: true
    performance: true
  # Exploit notification batch interval (seconds)
  batch-seconds: 30

# Statistics Persistence
statistics:
  enabled: true
  # Auto-save interval (minutes)
  auto-save-minutes: 5
  # Maximum attack history records
  max-attack-history: 100

# Verified Player Cache
verified-cache:
  enabled: true
  # Cache duration (hours)
  ttl-hours: 48
  # Skip bot check for verified players
  skip-bot-check: true
  # Skip IP check for verified players
  skip-ip-check: false

# ═══════════════════════════════════════
# Anti-VPN & IP Reputation v2.4.0
# Advanced Multi-Layer Proxy/VPN Blocking System
# 7-Layer Check: Whitelist → Manual Blacklist → Proxy List → CIDR → ASN → API → Fallback API
# ═══════════════════════════════════════
anti-vpn:
  # Enable system
  enabled: false
  # Kick message (MiniMessage format)
  kick-message: "<red>Proxy or VPN usage detected in our systems.<br><gray>If this is an error, contact the server administrator."
  # API cache duration (hours)
  cache-hours: 24
  # Risk threshold (0-100) — Bots are usually 60+. Lowering makes it stricter.
  risk-threshold: 60
  # FP-02: Should hosting IPs be blocked? (Default false, protects legitimate players)
  block-hosting: false
  # Blocked countries (ISO codes, e.g. "CN", "RU", "US")
  blocked-countries: []
  # Send in-game notification to admins (when proxy is blocked, when list is updated)
  admin-notify: true

  # ── Whitelist ──
  # These IPs are COMPLETELY exempt from all 7 layers of checks
  whitelist: []
  # Player-based whitelist (usernames, write in lowercase)
  player-whitelist: []

  # ── Proxy List System ──
  # On server start, downloads up-to-date proxy IP lists from GitHub IN PARALLEL,
  # merges them and saves to local file (proxy_ips.txt).
  # Incoming connections are checked instantly with O(1) HashSet lookup.
  proxy-list:
    enabled: true
    # Proxy list URLs to download (IP:PORT format, line by line)
    # You can add as many URLs as you want
    urls:
      - "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/refs/heads/master/http.txt"
      - "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/refs/heads/master/socks4.txt"
      - "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/refs/heads/master/socks5.txt"
    # Download timeout (ms) — increase for slow connections
    download-timeout-ms: 30000
    # How many retries on failed downloads (exponential backoff)
    max-retries: 3
    # Auto-refresh interval (minutes, 0 = only on startup)
    # E.g. 360 = auto-update every 6 hours
    auto-refresh-minutes: 0

  # ── API Checks ──
  # API queries are made for IPs not found in the proxy list
  api-check:
    enabled: true
    # ProxyCheck.io API Key (not required but recommended, 1000 free queries/day)
    api-key: ""
    # ip-api.com fallback API (activates if ProxyCheck.io fails, no API key required)
    fallback-enabled: true

  # ── CIDR Subnet Blocking ──
  # Block known datacenter/hosting IP ranges in CIDR format
  # Example: IP blocks of providers like OVH, Hetzner, DigitalOcean
  cidr-blocking:
    enabled: false
    # CIDR ranges (IP/prefix format)
    blocked-ranges: []
    # Example:
    # - "198.51.100.0/24"
    # - "203.0.113.0/24"

  # ── ASN Blocking ──
  # Block ASN numbers of known VPN/datacenter/hosting providers
  # ASN numbers are automatically detected from ProxyCheck.io or ip-api.com API
  asn-blocking:
    enabled: false
    # Blocked ASN numbers
    blocked-asns: []
    # Example popular hosting/VPN ASNs:
    # - "AS14061"   # DigitalOcean
    # - "AS16276"   # OVH
    # - "AS24940"   # Hetzner
    # - "AS63949"   # Akamai/Linode
    # - "AS14618"   # AWS

# Attack Mode (Real-time Protection)
attack-mode:
  # How many connections per second to activate "Attack Mode"?
  threshold: 10
  # Minimum unique IPs required to trigger Attack Mode (prevents a single player from triggering it)
  min-unique-ips: 10
  # How long should Attack Mode last? (Seconds)
  duration-seconds: 60
  # v2.3 — Automatic actions during attack
  actions:
    # Block IPs that have not successfully connected before
    block-unverified-ips: true
    # Tighten packet rate limits
    strict-limits: true
    # Strict limit multiplier (0.5 = limits halved)
    strict-limit-factor: 0.5
    # Automatically enable certain modules
    auto-enable-modules: true
    # Modules to automatically enable
    auto-modules:
      - "packet-exploit"
      - "token-bucket"
    # Only allow verified IPs (very strict)
    whitelist-only: false
    # Send Discord notification
    discord-notify: true

# ═══════════════════════════════════════
# Module Settings
# Each module can be toggled individually
# ═══════════════════════════════════════

modules:
  # Too many books per chunk (Crasher/Dupe)
  too-many-books:
    enabled: true
    # Maximum books per chunk
    max-books-per-chunk: 50
    # Maximum page length (characters)
    max-page-length: 256
    # Maximum total book size (bytes)
    max-total-size: 100000
    # Action on violation: BLOCK, REMOVE, KICK
    action: "BLOCK"

  # Packet delay exploit (Bundle Dupe)
  packet-delay:
    enabled: true
    # Maximum packets per second (per packet type)
    max-packets-per-second: 500
    # Packet delay threshold (ms)
    delay-threshold-ms: 20

  # Packet exploit fix (Netty Crasher)
  packet-exploit:
    enabled: true
    # Maximum packet size (bytes)
    max-packet-size: 32767
    # Maximum total packet rate per second
    max-packet-rate: 800
    # Time window (ms)
    time-window-ms: 1000
    # Blacklisted packet types
    blacklisted-packets: []
    # CR-08: Type-based limits
    type-limits:
      PLUGIN_MESSAGE: 50
      CLICK_WINDOW: 100
      CREATIVE_INVENTORY_ACTION: 50
      EDIT_BOOK: 5
      UPDATE_SIGN: 10
      CHAT_MESSAGE: 20

  # CustomPayload fix
  custom-payload:
    enabled: true
    # Allowed channels (empty = default safe channels)
    # Channels with minecraft: and bungeecord: prefixes are allowed by default
    allowed-channels: []
    # Maximum payload size (bytes)
    max-payload-size: 32767
    # Block unknown channels
    block-unknown-channels: true

  # Command crash fix
  command-crash:
    enabled: true
    # Blocked commands (regex supported)
    # WARNING: Overly broad patterns will cause false positives!
    blocked-commands:
      - "//calc.*"
      - "//eval.*"
      - "/worldedit:.*calc.*"

  # Creative item fix (World Crasher)
  creative-items:
    enabled: true
    # Item blacklist (material names)
    item-blacklist:
      - "COMMAND_BLOCK"
      - "COMMAND_BLOCK_MINECART"
      - "BARRIER"
      - "STRUCTURE_BLOCK"
      - "STRUCTURE_VOID"
      - "JIGSAW"
      - "DEBUG_STICK"
    # Maximum NBT size in creative mode
    max-nbt-size-creative: 50000
    # Strip custom data
    strip-custom-data: true
    # Maximum enchantment level
    max-enchant-level: 255

  # Sign crash fix (World Crasher)
  sign-crash:
    enabled: true
    # Maximum line length (vanilla: ~384 chars)
    # CR-04: Lowered to 100 for security
    max-line-length: 100
    # Clean color codes
    clean-color-codes: false
    # Block special characters (Unicode overflow protection)
    block-special-chars: true

  # Lectern crash fix
  lectern-crash:
    enabled: true

  # Map label crash fix
  map-label-crash:
    enabled: true
    # Disable map labels
    disable-labels: false
    # Maximum labels per map
    max-label-count: 50

  # Invalid inventory slot fix
  invalid-slot:
    enabled: true

  # NBT crasher fix
  nbt-crash:
    enabled: true
    # Maximum NBT tag count
    max-nbt-tags: 1000
    # Maximum NBT depth
    max-nbt-depth: 16
    # Maximum NBT size (bytes)
    max-nbt-bytes: 500000
    # CR-01: Packet-level size limit
    max-nbt-packet: 200000

  # Book crash fix
  book-crash:
    enabled: true
    # Maximum title length
    max-title-length: 64
    # Maximum page count
    max-page-count: 100
    # Maximum page size
    max-page-size: 1024
    # CR-03: JSON depth limit
    json-depth-limit: 5
    # Maximum total book size
    max-total-book-size: 100000

  # Cow duplication fix
  cow-duplication:
    enabled: true
    # Shearing cooldown duration (ms)
    shearing-cooldown-ms: 500

  # Dispenser crash fix
  dispenser-crash:
    enabled: true

  # Offline packet duplication fix
  offline-packet:
    enabled: true
    # Tolerance duration (ms) — wait time for newly joined players
    tolerance-ms: 5000

  # Inventory duplication fix
  inventory-duplication:
    enabled: true

  # Mule duplication fix
  mule-duplication:
    enabled: true

  # Portal break fix
  portal-break:
    enabled: true
    # Block portal breaking with mushroom
    block-mushroom: true
    # Block portal breaking with water bucket
    block-water-bucket: true

  # Bundle duplication fix
  bundle-duplication:
    enabled: true
    # Click cooldown duration (ms) — only applies to bundle interactions
    click-cooldown-ms: 50
    # Drop cooldown duration (ms)
    drop-cooldown-ms: 50

  # Coordinate normalization
  coordinate-normalize:
    enabled: true

  # Item frame crash fix
  frame-crash:
    enabled: true
    # Maximum frames per chunk
    max-frames-per-chunk: 100
    # Maximum armor stands per chunk
    max-armor-stands-per-chunk: 50

  # NEW-01: Chunk Crash Protection
  chunk-crash:
    enabled: true
    max-chunk-loads-per-second: 20
    max-entities-per-chunk: 200
    max-tile-entities-per-chunk: 100

  # NEW-02: Anvil and Crafting Crash Protection
  anvil-craft-crash:
    enabled: true
    max-anvil-name-length: 50

  # NEW-03: Entity Interaction Crash Protection
  entity-interact-crash:
    enabled: true
    max-interaction-distance: 6.0
    max-interactions-per-second: 20

  # NEW-04: Container/Window Crash Protection
  container-crash:
    enabled: true

  # NEW-05: Bundle and Component Crash Protection
  component-crash:
    enabled: true
    max-bundle-depth: 3

  # ═══════════════════════════════════════
  # v2.2 — Advanced Security Modules
  # ═══════════════════════════════════════

  # Falling Block (Sand/Gravel) Limiter
  falling-block-limiter:
    enabled: true
    # Maximum falling blocks per chunk
    max-falling-blocks-per-chunk: 64
    # Block accumulation (stacking at same location)
    block-accumulation: true

  # Explosion Limiter
  explosion-limiter:
    enabled: true
    # Maximum explosions per second
    max-explosions-per-second: 10
    # Maximum block damage per explosion
    max-block-damage: 1000
    # Note: End Crystal explosions are exempt from this limit.

  # Movement Security
  movement-security:
    enabled: true
    # Invalid coordinate check (NaN, Infinite)
    block-invalid-coords: true
    # Maximum movement distance (Teleport/Move)
    max-distance: 30000000
    # Chunk overload check (excessively fast movement)
    block-fast-movement: true

  # Visual Crasher Protection (Firework/Particle)
  visual-crasher:
    enabled: true
    # Maximum firework explosion effects (NBT-based)
    max-firework-effects: 15
    # CR-09: Maximum colors per effect
    max-colors-per-effect: 20
    # CR-09: Maximum firework power
    max-firework-power: 5
    # Maximum particle packets per second
    max-particle-packets-per-second: 100

  # Advanced Chat and Tab-Complete
  advanced-chat:
    enabled: true
    unicode-filter: true
    max-tab-requests-per-second: 5
    command-char-check: true

    # Rate Limit (Flood)
    rate-limit:
      enabled: true
      max-per-second: 3

    # Duplicate Message Check
    duplicate-message:
      enabled: true
      remember-count: 5

    # Caps Spam
    caps-spam:
      enabled: true
      threshold-percent: 80
      min-length: 10

  # Password Check Module (Auth Integration)
  password-check:
    enabled: true
    # For password hashes to be sent to Velocity

  # Piston Limiter
  piston-limiter:
    enabled: true
    # Maximum piston moves per second (per chunk)
    max-piston-moves-per-second: 50
    # Block zero-tick machines
    block-zero-tick: true

  # Smart Lag Detection (Heuristic)
  smart-lag:
    enabled: true
    # Tick duration to consider as lag (ms)
    lag-threshold-ms: 50
    # How many entities per chunk to consider "heavy"
    entity-threshold-per-chunk: 50
    # How many tile entities per chunk to consider "heavy"
    tile-entity-threshold-per-chunk: 30

  # Advanced Duplication (Portal/Shulker)
  advanced-duplication:
    enabled: true

  # v2.3 — Connection Rate Limiter
  connection-throttle:
    enabled: true
    # Maximum connections per minute per IP
    max-connections-per-minute: 3
    # Maximum connections per minute during attack mode
    attack-max-per-minute: 1
    # Exempt IP addresses
    exempt-ips: []

  # ═══════════════════════════════════════
  # Advanced AntiBot System v3.2.0
  # ═══════════════════════════════════════

  # Bot Protection
  anti-bot:
    enabled: true

    # ===== SCORE THRESHOLDS =====
    score-thresholds:
      allow: 30          # Below this score = free pass
      delay: 60          # 30-59 = delay connection 1-3 sec
      kick: 80           # 60-79 = kick, can retry after 60 sec
      blacklist: 100     # 80+ = add IP to blacklist

    # ===== CHECK MODULES =====
    checks:
      connection-rate:
        enabled: true
        window-ms: 10000
        global-threshold: 20
        per-ip-threshold: 3
        attack-multiplier: 1.5

      ping-handshake:
        enabled: true
        ping-cache-minutes: 5
        no-ping-score-normal: 0
        no-ping-score-attack: 5
        attack-multiplier: 1.0

      username:
        enabled: true
        entropy-threshold: 4.0
        similarity-check-attack-only: true
        attack-multiplier: 1.2

      protocol:
        enabled: true
        client-settings-wait-ticks: 40
        client-brand-wait-ticks: 20
        attack-multiplier: 1.0

      first-join-behavior:
        enabled: true
        analysis-ticks: 100
        attack-multiplier: 1.0

      gravity:
        enabled: true
        tolerance: 0.08
        min-data-count: 8
        attack-multiplier: 1.0

      packet-timing:
        enabled: true
        min-interval-ms: 30
        max-interval-ms: 150
        min-keepalive-ms: 2
        attack-multiplier: 1.0

      post-join-behavior:
        enabled: true
        analysis-ticks: 1200
        attack-multiplier: 1.0

    # ===== ATTACK MODE =====
    attack-mode:
      enabled: true
      trigger-threshold: 15
      window-seconds: 5
      shutdown-seconds: 60
      threshold-multiplier: 0.85
      connection-queue: true
      queue-delay-ms: 2000

    # ===== WHITELIST =====
    whitelist:
      enabled: true
      auto-verify: true
      verify-timeout-ticks: 600
      max-verify-score: 15
      session-verify-count: 3
      file: "whitelist.json"

    # ===== VERIFICATION =====
    verification:
      enabled: true
      timeout: 30
      verify-message: "&cPlease move to verify!"
      verified-message: "&aVerification successful!"

    # ===== BLACKLIST =====
    blacklist:
      enabled: true
      default-duration-minutes: 60
      max-entries: 10000
      cleanup-interval-minutes: 5
      file: "blacklist.json"

    # ===== NOTIFICATIONS =====
    notify:
      attack-start: true
      attack-end: true
      high-score-kick: true
      blacklist-add: true
      admin-permission: "atomguard.antibot.notify"

    # ===== LOGGING =====
    log:
      enabled: true
      detailed-score-log: false
      attack-log: true
      blacklist-log: true

  # Honeypot Module
  honeypot:
    enabled: false
    # Honeypot port (a port other than the main server port)
    port: 25566
    # Maximum concurrent connections
    max-connections: 100
    # Connection timeout (ms)
    timeout-ms: 5000
    # Fake MOTD text
    fake-motd: "§aMinecraft Server §8| §7Online"
    # Fake online player count
    fake-online: 5
    # Fake maximum player count
    fake-max: 20
    # Add captured IP to blacklist
    add-to-blacklist: true
    # Blacklist duration (minutes)
    blacklist-duration-minutes: 1440
    # Send Discord notification
    discord-notify: true
    # Honeypot statistics file
    stats-file: "honeypot-stats.json"

  # Panic Mode (/panic)
  panic-mode:
    # Minimum play time (minutes) - Everyone below this will be banned
    min-play-time: 30
    # Log file name
    log-file: "panic-bans.log"

  # Bot Protection Module (Legacy — AtomShield protocol checks)
  # This module only provides AtomShield protocol features in attack analysis.
  # Use AntiBotModule (anti-bot) for the verification system.
  bot-protection:
    enabled: false
    verification:
      enabled: false
    atom-shield:
      protocol:
        enabled: true
        encryption-delay: true
        min-login-delay: 0
      handshake:
        enabled: true
        hostname-required: false
        port-check: true
      behavioral:
        rotation-analysis: true
        gravity-test: false
    similar-name-check:
      enabled: true
      char-diff: 2
      max-similar: 15

# ═══════════════════════════════════════
# Metrics v2.0.0
# TPS, memory, module block statistics
# ═══════════════════════════════════════
metrics:
  enabled: true
  update-interval-seconds: 1

# ═══════════════════════════════════════
# Threat Intelligence Engine v1.2.0
# Adaptive EMA-based traffic profile + Z-Score anomaly detection
# ═══════════════════════════════════════
threat-intelligence:
  # Enable system
  enabled: true
  # Learning mode: when on, only collects data, does not issue anomaly alerts
  learning-mode: false
  # Learning duration (hours) — baseline is considered reliable after this time
  learning-hours: 48
  # Minimum sample count for baseline
  min-samples: 10
  # EMA coefficient (0.001-1.0) — smaller = slower learning, stable profile
  ema-alpha: 0.1
  # Sensitivity multiplier (0.1-5.0) — larger = more sensitive detection
  sensitivity: 1.0
  # Waiting time before the same alert is sent again (seconds)
  alert-cooldown-seconds: 300
  # Real-time buffer size (last N samples in minutes)
  buffer-size: 60
  # Detection engine: "zscore", "ewma" or "isolation-forest"
  detection-engine: "ewma"
  # Adaptive threshold system
  adaptive-threshold:
    enabled: true
    min-learning-weeks: 2
    day-night-separation: true
    weekday-weekend-separation: true
  # Isolation Forest parameters
  isolation-forest:
    tree-count: 100
    sample-size: 256
    anomaly-threshold: 0.6
    min-samples: 50
    rebuild-interval: 100

# ═══════════════════════════════════════
# Player Trust Score v1.2.0
# 0-100 trust score, bypass rights
# ═══════════════════════════════════════
trust-score:
  # Enable system
  enabled: true
  # Starting score for new players (0-100)
  initial-score: 30
  # TRUSTED (60+) players bypass attack mode
  attack-mode-bypass-min: 60
  # VETERAN (85+) players bypass bot check
  bot-check-bypass-min: 85
  # VETERAN (85+) players bypass VPN check
  vpn-check-bypass-min: 85
  # Score penalty per violation (for recent violations)
  violation-penalty: 5
  # Bonus per clean session
  clean-session-bonus: 2
  # Auto-save interval (minutes)
  auto-save-minutes: 5
  # Data file name
  data-file: "trust-scores.json"

# ═══════════════════════════════════════
# Forensics Analysis (Attack Replay) v1.2.0
# Attack snapshots, timeline, JSON export
# ═══════════════════════════════════════
forensics:
  # Enable system
  enabled: true
  # Maximum snapshot count
  max-snapshots: 50
  # Snapshot save directory
  save-directory: "forensics"
  # JSON format export
  json-export: true
  # Periodic metric recording interval (seconds)
  metric-interval-seconds: 10

# ═══════════════════════════════════════
# Notification System v2.0.0
# Discord, Telegram and Slack integration
# ═══════════════════════════════════════
notifications:
  # Discord Webhook
  discord:
    enabled: false
    webhook-url: ""
    types: [ATTACK_MODE, EXPLOIT_BLOCKED, PANIC_COMMAND, DDOS_DETECTED]
    batch-seconds: 30

  # Telegram Bot
  telegram:
    enabled: false
    bot-token: ""
    chat-id: ""
    types: [ATTACK_MODE, DDOS_DETECTED, PANIC_COMMAND]

  # Slack Webhook
  slack:
    enabled: false
    webhook-url: ""
    channel: "#minecraft-security"
    types: [ATTACK_MODE, PERFORMANCE_ALERT]

# ═══════════════════════════════════════
# Packet Recording (Forensics v2.0.0)
# Records packet traffic of suspicious players
# ═══════════════════════════════════════
packet-forensics:
  recording:
    enabled: true
    # Circular buffer duration per player (seconds)
    buffer-seconds: 30
    # How many players can be recorded simultaneously
    max-concurrent: 10
    # Automatically start recording when heuristic score exceeds this threshold
    auto-record-threshold: 50
    # Recording file size limit (MB)
    max-file-mb: 50
    # How long to keep old recordings (days)
    retention-days: 7

# ═══════════════════════════════════════
# External Service URLs
# Leave as default if no changes needed
# ═══════════════════════════════════════
external-services:
  ashcon-api: "https://api.ashcon.app/mojang/v2/user/"
  proxycheck: "https://proxycheck.io/v2/"
  ip-api: "http://ip-api.com/json/"
  abuseipdb: "https://api.abuseipdb.com/api/v2/check"
  iphub: "https://v2.api.iphub.info/ip/"
