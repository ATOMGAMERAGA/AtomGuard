# AtomGuard Velocity - Main Configuration File
config-version: "1.1.0"
language: "en"

# Storage Settings
storage:
  type: "sqlite"  # sqlite or mysql
  mysql:
    host: "localhost"
    port: 3306
    database: "atomguard"
    username: "root"
    password: ""

# Metrics and Monitoring
metrics:
  prometheus:
    enabled: true
    port: 9225

# Redis Synchronization (Between Bungee/Velocity)
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  timeout: 3000

# Discord Notifications
discord-webhook:
  enabled: false
  webhook-url: ""

# General Settings
general:
  # Offline-mode (cracked) sunucular için: aynı IP'den farklı kullanıcı adıyla giriş normal sayılır.
  # true ise TrustScore'da "çok fazla farklı isim" penaltısı devre dışı kalır.
  offline-mode: false

# Pipeline Modules (Processed in Priority Order)
modules:
  bot-protection:
    enabled: true
    analysis-window: 20          # was 15 — daha geniş analiz penceresi
    suspicious-threshold: 10     # was 8 — daha toleranslı eşik
    high-risk-threshold: 80      # was 75 — daha az agresif
    medium-risk-threshold: 50    # was 45 — daha az agresif
    trust-score-threshold: 5     # was 10 — yeni oyuncu koruması (başlangıç skoru 50)
    protocol-validation: true
    allow-unknown-brands: true
    blocked-brands: []
    allowed-brands: []
    extra-protocols: []
    # JoinPatternDetector parametreleri — sunucu tipine göre ayarlanabilir
    join-window-seconds: 120         # Bu süre içindeki join sayısı takip edilir
    max-joins-in-window: 8           # Pencerede bu kadar join → rapid-joiner flag (min 8)
    max-quits-before-suspect: 20     # Bu kadar quit → frequent-quitter flag (min 20)
    captcha:
      enabled: false
      timeout: 60
    nick-engelleme:
      aktif: true
      minimum-uzunluk: 3
      maksimum-uzunluk: 16
      sadece-sayi-engel: true
      ozel-karakter-engel: true
      buyuk-harf-esik: 10
      bedrock-prefix: "."   # Floodgate/Bedrock oyuncu prefix'i — bu ile başlayanlar özel karakter kontrolünden muaf
      tam-eslesme: []
      prefix-listesi: []
      suffix-listesi: []
      regex-listesi: []
  firewall:
    enabled: true
    auto-ban-threshold: 150
    auto-ban-duration: 3600
    permanent-ban-threshold: 500
    decay-minutes: 5
  rate-limit:
    enabled: true
    connections-per-second:
      per-ip-max: 5      # Reconnect toleransı (verified oyuncular bu limitten muaf)
      global-max: 100
    ping-per-second:
      per-ip-max: 5      # IP başına saniyede maksimum ping isteği
      global-max: 200    # Sunucu geneli saniyede maksimum ping isteği
  ddos-protection:
    enabled: true
    dry-run: false  # true yapılırsa engeller loglanır ama bağlantı reddedilmez
    connection-limit:
      per-ip-per-minute: 15     # was 10 — reconnect toleransı (verified oyuncular muaf)
      global-per-second: 100
      per-subnet-per-minute: 30
      subnet-ban-enabled: false
      subnet-ban-threshold: 10
    ping-limit: 5
    attack-mode:
      threshold: 50
      min-unique-ips: 15
    attack-levels:
      enabled: true
      hysteresis-rise-seconds: 10   # was 5 — daha yavaş saldırı seviyesi yükseltme
      hysteresis-fall-seconds: 20   # was 30 — daha hızlı normale dönüş
      verified-reserved-slots: 50
      captcha-levels:
        - "ELEVATED"
        - "HIGH"
    smart-throttle:
      enabled: true
      normal-limit: 20       # was 15 — daha toleranslı normal trafik
      cautious-limit: 10     # was 8
      aggressive-limit: 4    # was 3
      lockdown-limit: 1
    anomaly-detection:
      enabled: true
      z-score-threshold: 3.0
      profile-window-hours: 1
      slow-ramp-threshold-percent: 10.0
      pulse-detection-enabled: true
    fingerprinting:
      enabled: true
      known-botnet-patterns:
        - "null|bot-fast"
        - "unknown|bot-fast"
        - "ip-like|bot-fast"
      mass-threshold: 20
    ip-reputation:
      enabled: true
      initial-score: 75              # was 60 — Forge el sıkışması false ban riskini azaltmak için artırıldı
      successful-connection-bonus: 8  # was 5 — başarılı bağlantı daha fazla ödül
      rate-limit-penalty: 5           # was 10 — geçici throttle çok fazla ceza veriyordu
      invalid-handshake-penalty: 3    # was 8 — Forge/FML handshake geçersiz sayılabiliyor, ceza düşürüldü
      slowloris-penalty: 25
      attack-connection-penalty: 10   # was 20 — saldırı sırasında reconnect çok fazla ceza veriyordu
      auto-ban-threshold-1hour: 15    # was 20 — skor 15'in altına düşerse 1 saatlik ban (daha az agresif)
      auto-ban-threshold-24hours: 10  # was 5 — skor 10'un altına düşerse 24 saatlik ban
      decay-points-per-hour: 5        # was 3 — daha hızlı toparlanma
      verified-minimum-score: 40      # was 30 — verified IP'lerin minimum skoru artırıldı
    attack-recording:
      enabled: true
      json-save: true
      max-history: 50
      snapshot-interval-seconds: 5
    metrics:
      enabled: true
      prometheus-enabled: false
      prometheus-port: 9225
      history-minutes: 60
    slowloris-advanced:
      enabled: true
      max-pending-per-ip: 5
      timeout-ms: 10000
      pending-rate-alarm: 0.30
      keep-alive-check: true
    burst-allowance:
      enabled: true
      burst-threshold: 30        # Bu CPS'de burst değerlendirmesi başlar
      burst-window-seconds: 15   # Burst tolerans süresi
      burst-multiplier: 3        # Burst sırasında limitler 3x
      max-bursts-per-hour: 10    # Abuse önleme
      min-verified-ratio-percent: 15  # was 30 — server restart'larında %30 verified oran elde edilemiyordu
    geo-blocking:
      enabled: false
      blocked-countries: []
      allowed-countries: []
      allowed-countries-mode: false
  vpn-proxy-block:
    enabled: true
    consensus-threshold: 2
    trust-score-threshold: 60
    residential-bypass: true
    premium-vpn-policy: "allow"
  exploit-protection:
    enabled: true
    tab-complete-limit: 5
    chat-limit: 3
    repeat-message-limit: 5
    command-limit: 10
    server-switch-limit: 10
    auth-exempt-commands:
      - "login"
      - "l"
      - "register"
      - "reg"
      - "changepassword"
      - "cp"
  account-firewall:
    enabled: true

  # ══════════════════════════════════════════════════════════════
  # Opsiyonel Modüller — VARSAYILAN KAPALI
  # Bu modüller config'de tanımlı değilse VelocityModule.isConfigActive()
  # varsayılan=true döndürür ve sessizce aktif olur. Aşağıdaki tanımlar
  # bunları varsayılan kapalı yapar. Manuel olarak enable: true yapın.
  # ══════════════════════════════════════════════════════════════

  yeniden-baglanti-kontrol:
    enabled: false   # Manuel olarak aktifleştirin
    hizli-yeniden-baglanti:
      aktif: true
      cooldown-saniye: 5       # 10 → 5: daha toleranslı (sunucu geçişlerinde UX)
    crash-dongu-tespit:
      aktif: true
      esik-sayisi: 5           # 3 → 5: sunucu restart'larında false positive önleme
      pencere-saniye: 60       # 30 → 60: daha geniş pencere
      aksiyon: "flag"          # "kick" → "flag": varsayılan güvenli
    kisa-oturum-tespit:
      aktif: true
      min-oturum-saniye: 3
    aksiyon-mesaji:
      delay: "<gray>Bağlantı kurulmadan önce {sure} saniye bekleniyor..."
      kick: "<red>Çok fazla yeniden bağlantı girişimi."

  gecikme-kontrol:
    enabled: false   # Manuel olarak aktifleştirin
    handshake-login-suresi:
      minimum-ms: 0            # 5 → 0: lokal proxy/veri merkezi false positive önleme
      maksimum-ms: 30000
      aksiyon-hizli: "flag"    # "kick" → "flag": varsayılan güvenli
      aksiyon-yavas: "flag"    # "kick" → "flag": varsayılan güvenli

  hizli-sohbet-kontrol:
    enabled: false   # Manuel olarak aktifleştirin
    mesaj-hizi:
      saniyede-max: 3.0
      burst-izin: 5.0
    tekrar-mesaj:
      aktif: true
      hatirlama-sayisi: 5
    pattern-analiz:
      aktif: true
      buyuk-harf-yuzde: 80
      minimum-uzunluk: 5
      tekrar-karakter-esik: 5
      link-engel: false
    mesajlar:
      rate-limit: "<red>Çok hızlı mesaj gönderiyorsunuz!"
      tekrar-mesaj: "<red>Aynı mesajı tekrar gönderemezsiniz!"

  password-check:
    enabled: false   # Manuel olarak aktifleştirin

  ulke-filtreleme:
    enabled: false   # Manuel olarak aktifleştirin (GeoIP DB gerektirir)

  # ══════════════════════════════════════════════════════════════
  # Sonar-Tarzı Limbo Doğrulama (v2.2.0+)
  # ══════════════════════════════════════════════════════════════
  # Oyuncuları sahte bir limbo sunucuya yönlendirerek gerçek MC
  # client'ı olduklarını doğrular. Bot yazılımları fizik simülasyonu
  # yapamadığı için %99.9+ tespit oranı.
  #
  # KURULUM:
  # 1. velocity.toml'a limbo sunucu ekle:
  #      [servers]
  #      limbo = "127.0.0.1:25567"
  # 2. AtomGuard-Limbo.jar'ı limbo sunucuya kur
  # 3. Bu modülü aktifleştir
  dogrulama:
    enabled: false   # true yaparak aktifleştir (limbo sunucu kurulumu gerekli)

    # Limbo sunucu ayarları
    limbo:
      max-concurrent: 50       # Aynı anda max doğrulama
      timeout-seconds: 15      # Doğrulama zaman aşımı

    # Bağlantı kuyruğu
    queue:
      max-size: 200            # Toplam kuyruk kapasitesi
      per-ip-max: 3            # IP başına kuyrukta max bağlantı

    # Ana sunucu adı (doğrulama sonrası yönlendirilecek)
    main-server: "lobby"

    # Doğrulanmış oyuncu veritabanı
    storage:
      expiry-days: 30          # Verified süresi (gün)

  # ══════════════════════════════════════════════════════════════
  # Embedded Physics Limbo Doğrulama (v2.2.0+)
  # ══════════════════════════════════════════════════════════════
  # MEDIUM_RISK bot tespiti → oyuncuyu anlık fizik testine alır.
  # Ayrı bir limbo sunucuya gerek yok — Velocity içine gömülü.
  limbo-dogrulama:
    enabled: false               # true yaparak aktifleştir
    timeout-saniye: 6            # Fizik doğrulaması bekleme süresi
    timeout-banlama: false       # true → timeout = bot say; false → geçir
    hedef-sunucu: "survival"     # Doğrulama sonrası gidilecek sunucu (velocity'de kayıtlı)

# External Service URLs (use defaults unless you need to change them)
external-services:
  proxycheck-url: "https://proxycheck.io/v2/"
  ip-api-url: "http://ip-api.com/json/"
  abuseipdb-url: "https://api.abuseipdb.com/api/v2/check"
  iphub-url: "https://v2.api.iphub.info/ip/"
  ashcon-url: "https://api.ashcon.app/mojang/v2/user/"
