# AtomGuard Velocity - Main Configuration File
config-version: "1.1.0"
language: "en"

# Storage Settings
storage:
  type: "sqlite"  # sqlite or mysql
  mysql:
    host: "localhost"
    port: 3306
    database: "atomguard"
    username: "root"
    password: ""

# Metrics and Monitoring
metrics:
  prometheus:
    enabled: true
    port: 9225

# Redis Synchronization (Between Bungee/Velocity)
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  timeout: 3000

# Discord Notifications
discord-webhook:
  enabled: false
  webhook-url: ""

# Pipeline Modules (Processed in Priority Order)
modules:
  bot-protection:
    enabled: true
    analysis-window: 15
    suspicious-threshold: 8
    high-risk-threshold: 75
    medium-risk-threshold: 45
    trust-score-threshold: 10 # IPs below this threshold are rejected by TrustScoreCheck
    protocol-validation: true
    allow-unknown-brands: true
    blocked-brands: []
    allowed-brands: []
    extra-protocols: []
    captcha:
      enabled: false
      timeout: 60
    nick-engelleme:
      aktif: true
      minimum-uzunluk: 3
      maksimum-uzunluk: 16
      sadece-sayi-engel: true
      ozel-karakter-engel: true
      buyuk-harf-esik: 10
      tam-eslesme: []
      prefix-listesi: []
      suffix-listesi: []
      regex-listesi: []
  firewall:
    enabled: true
    auto-ban-threshold: 150
    auto-ban-duration: 3600
    permanent-ban-threshold: 500
    decay-minutes: 5
  rate-limit:
    enabled: true
    connections-per-second:
      per-ip-max: 5
      global-max: 100
  ddos-protection:
    enabled: true
    dry-run: false  # true yapılırsa engeller loglanır ama bağlantı reddedilmez
    connection-limit:
      per-ip-per-minute: 10
      global-per-second: 100
      per-subnet-per-minute: 30
      subnet-ban-enabled: false
      subnet-ban-threshold: 10
    ping-limit: 5
    attack-mode:
      threshold: 50
      min-unique-ips: 15
    attack-levels:
      enabled: true
      hysteresis-rise-seconds: 5
      hysteresis-fall-seconds: 30
      verified-reserved-slots: 50
      captcha-levels:
        - "ELEVATED"
        - "HIGH"
    smart-throttle:
      enabled: true
      normal-limit: 15
      cautious-limit: 8
      aggressive-limit: 3
      lockdown-limit: 1
    anomaly-detection:
      enabled: true
      z-score-threshold: 3.0
      profile-window-hours: 1
      slow-ramp-threshold-percent: 10.0
      pulse-detection-enabled: true
    fingerprinting:
      enabled: true
      known-botnet-patterns:
        - "null|bot-fast"
        - "unknown|bot-fast"
        - "ip-like|bot-fast"
      mass-threshold: 20
    ip-reputation:
      enabled: true
      initial-score: 50
      successful-connection-bonus: 5
      rate-limit-penalty: 10
      invalid-handshake-penalty: 15
      slowloris-penalty: 25
      attack-connection-penalty: 20
      auto-ban-threshold-1hour: 20
      auto-ban-threshold-24hours: 5
      decay-points-per-hour: 3
      verified-minimum-score: 30
    attack-recording:
      enabled: true
      json-save: true
      max-history: 50
      snapshot-interval-seconds: 5
    metrics:
      enabled: true
      prometheus-enabled: false
      prometheus-port: 9225
      history-minutes: 60
    slowloris-advanced:
      enabled: true
      max-pending-per-ip: 5
      timeout-ms: 10000
      pending-rate-alarm: 0.30
      keep-alive-check: true
    burst-allowance:
      enabled: true
      burst-threshold: 30        # Bu CPS'de burst değerlendirmesi başlar
      burst-window-seconds: 15   # Burst tolerans süresi
      burst-multiplier: 3        # Burst sırasında limitler 3x
      max-bursts-per-hour: 10    # Abuse önleme
      min-verified-ratio-percent: 30  # Burst için minimum verified IP oranı
    geo-blocking:
      enabled: false
      blocked-countries: []
      allowed-countries: []
      allowed-countries-mode: false
  vpn-proxy-block:
    enabled: true
    consensus-threshold: 2
    trust-score-threshold: 60
    residential-bypass: true
    premium-vpn-policy: "allow"
  exploit-protection:
    enabled: true
    tab-complete-limit: 5
    chat-limit: 3
    repeat-message-limit: 5
    command-limit: 10
    server-switch-limit: 10
    auth-exempt-commands:
      - "login"
      - "l"
      - "register"
      - "reg"
      - "changepassword"
      - "cp"
  account-firewall:
    enabled: true

# External Service URLs (use defaults unless you need to change them)
external-services:
  proxycheck-url: "https://proxycheck.io/v2/"
  ip-api-url: "http://ip-api.com/json/"
  abuseipdb-url: "https://api.abuseipdb.com/api/v2/check"
  iphub-url: "https://v2.api.iphub.info/ip/"
  ashcon-url: "https://api.ashcon.app/mojang/v2/user/"
