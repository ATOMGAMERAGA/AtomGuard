# AtomGuard Velocity - Main Configuration File
config-version: "1.1.0"
language: "en"

# Storage Settings
storage:
  type: "sqlite"  # sqlite or mysql
  mysql:
    host: "localhost"
    port: 3306
    database: "atomguard"
    username: "root"
    password: ""

# Metrics and Monitoring
metrics:
  prometheus:
    enabled: true
    port: 9225

# Redis Synchronization (Between Bungee/Velocity)
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  timeout: 3000

# Discord Notifications
discord-webhook:
  enabled: false
  webhook-url: ""

# Bot and Behavior Control
bot-protection:
  analysis-window: 15
  suspicious-threshold: 8
  high-risk-threshold: 75
  medium-risk-threshold: 45
  trust-score-threshold: 10 # IPs below this threshold are rejected by TrustScoreCheck

# Pipeline Modules (Processed in Priority Order)
modules:
  firewall:
    enabled: true
    auto-ban-threshold: 150
    auto-ban-duration: 3600
    decay-minutes: 5
  rate-limit:
    enabled: true
    connections-per-second:
      per-ip-max: 3
      global-max: 50
  ddos-protection:
    enabled: true
    connection-limit:
      per-ip-per-minute: 5
      global-per-second: 50
      per-subnet-per-minute: 20
      subnet-ban-enabled: false
      subnet-ban-threshold: 10
    ping-limit: 3
    attack-mode:
      threshold: 30
    attack-levels:
      enabled: true
      hysteresis-rise-seconds: 3
      hysteresis-fall-seconds: 15
      verified-reserved-slots: 50
      captcha-levels:
        - "ELEVATED"
        - "HIGH"
    smart-throttle:
      enabled: true
      normal-limit: 10
      cautious-limit: 5
      aggressive-limit: 2
      lockdown-limit: 0
    anomaly-detection:
      enabled: true
      z-score-threshold: 3.0
      profile-window-hours: 1
      slow-ramp-threshold-percent: 10.0
      pulse-detection-enabled: true
    fingerprinting:
      enabled: true
      known-botnet-patterns:
        - "null|bot-fast"
        - "unknown|bot-fast"
        - "ip-like|bot-fast"
      mass-threshold: 20
    ip-reputation:
      enabled: true
      initial-score: 50
      successful-connection-bonus: 5
      rate-limit-penalty: 10
      invalid-handshake-penalty: 15
      slowloris-penalty: 25
      attack-connection-penalty: 20
      auto-ban-threshold-1hour: 20
      auto-ban-threshold-24hours: 5
      decay-points-per-hour: 3
      verified-minimum-score: 30
    attack-recording:
      enabled: true
      json-save: true
      max-history: 50
      snapshot-interval-seconds: 5
    metrics:
      enabled: true
      prometheus-enabled: false
      prometheus-port: 9225
      history-minutes: 60
    slowloris-advanced:
      enabled: true
      max-pending-per-ip: 5
      timeout-ms: 10000
      pending-rate-alarm: 0.30
      keep-alive-check: true
    geo-blocking:
      enabled: false
      blocked-countries: []
      allowed-countries: []
      allowed-countries-mode: false
  vpn-proxy-block:
    enabled: true
    consensus-threshold: 2
    trust-score-threshold: 60
    residential-bypass: true
  account-firewall:
    enabled: true

# External Service URLs (use defaults unless you need to change them)
external-services:
  proxycheck-url: "https://proxycheck.io/v2/"
  ip-api-url: "http://ip-api.com/json/"
  abuseipdb-url: "https://api.abuseipdb.com/api/v2/check"
  iphub-url: "https://v2.api.iphub.info/ip/"
  ashcon-url: "https://api.ashcon.app/mojang/v2/user/"
