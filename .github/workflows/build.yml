name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run Tests
        run: mvn test -B
        continue-on-error: true

      - name: Generate Coverage Report
        run: mvn jacoco:report -B
        continue-on-error: true

      - name: Run SpotBugs
        run: mvn spotbugs:check -B
        continue-on-error: true

      - name: Run Checkstyle
        run: mvn checkstyle:check -B
        continue-on-error: true

      - name: Verify build output
        run: |
          CORE_JAR=$(find core/target -maxdepth 1 -name "AtomGuard-core-*.jar" -not -name "*-sources*" -not -name "*original*" | head -1)
          VELOCITY_JAR=$(find velocity/target -maxdepth 1 -name "AtomGuard-velocity-*.jar" -not -name "*-sources*" -not -name "*original*" | head -1)
          API_JAR=$(find api/target -maxdepth 1 -name "AtomGuard-api-*.jar" -not -name "*-sources*" | head -1)
          if [ -n "$CORE_JAR" ] && [ -n "$VELOCITY_JAR" ]; then
            echo "✅ Build successful:"
            echo "   Core     : $CORE_JAR ($(du -h $CORE_JAR | cut -f1))"
            echo "   Velocity : $VELOCITY_JAR ($(du -h $VELOCITY_JAR | cut -f1)) ← Embedded Limbo"
            echo "   API      : ${API_JAR:-N/A}"
          else
            echo "❌ Build failed — JARs not found (core=$CORE_JAR velocity=$VELOCITY_JAR)"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AtomGuard-${{ github.ref_name }}-SNAPSHOT
          path: |
            core/target/AtomGuard-core-*.jar
            velocity/target/AtomGuard-velocity-*.jar
          retention-days: 7